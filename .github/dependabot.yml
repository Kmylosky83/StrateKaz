# Dependabot configuration
# open-pull-requests-limit: 0 deshabilita los PRs automaticos en cada ecosistema
# Para reactivar, cambiar a un numero mayor (ej: 5) y ajustar el schedule

version: 2

updates:
  # BACKEND - Python (DESHABILITADO)
    - package-ecosystem: "pip"
        directory: "/backend"
            schedule:
                  interval: "weekly"
                      open-pull-requests-limit: 0

                        # FRONTEND - NPM (DESHABILITADO)
                          - package-ecosystem: "npm"
                              directory: "/frontend"
                                  schedule:
                                        interval: "weekly"
                                            open-pull-requests-limit: 0

                                              # CI - GitHub Actions (DESHABILITADO)
                                                - package-ecosystem: "github-actions"
                                                    directory: "/"
                                                        schedule:
                                                              interval: "weekly"
                                                                  open-pull-requests-limit: 0

                                                                    # DOCKER (DESHABILITADO)
                                                                      - package-ecosystem: "docker"
                                                                          directory: "/"
                                                                              schedule:
                                                                                    interval: "weekly"
                                                                                        open-pull-requests-limit: 0
