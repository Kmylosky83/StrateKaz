name: CI - Continuous Integration

# Trigger conditions
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress workflows when a new push occurs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════════
  # BACKEND TESTING & VALIDATION
  # ═══════════════════════════════════════════════════
  backend-test:
    name: Backend - Django Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: test_db
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptest_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmysqlclient-dev \
            pkg-config \
            python3-dev \
            build-essential \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment variables
        working-directory: ./backend
        run: |
          cat > .env << EOF
          DEBUG=True
          SECRET_KEY=test-secret-key-for-ci-pipeline
          DATABASE_ENGINE=django.db.backends.mysql
          DATABASE_NAME=test_db
          DATABASE_USER=test_user
          DATABASE_PASSWORD=test_password
          DATABASE_HOST=127.0.0.1
          DATABASE_PORT=3306
          ALLOWED_HOSTS=localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS=http://localhost:3010
          EOF

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h"127.0.0.1" -P 3306 -u root -ptest_password --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL is ready!"

      - name: Run Django checks
        working-directory: ./backend
        run: |
          python manage.py check --deploy

      - name: Run migrations
        working-directory: ./backend
        run: |
          python manage.py migrate --noinput

      - name: Collect static files
        working-directory: ./backend
        run: |
          python manage.py collectstatic --noinput

      - name: Run Django tests
        working-directory: ./backend
        run: |
          python manage.py test --verbosity=2 --keepdb
        continue-on-error: true

      - name: Run pytest (if available)
        working-directory: ./backend
        run: |
          pytest -v --disable-warnings
        continue-on-error: true

      - name: Check code formatting with Black
        working-directory: ./backend
        run: |
          black --check --diff .
        continue-on-error: true

      - name: Lint with Ruff
        working-directory: ./backend
        run: |
          ruff check .
        continue-on-error: true

  # ═══════════════════════════════════════════════════
  # FRONTEND BUILD & TYPE CHECKING
  # ═══════════════════════════════════════════════════
  frontend-build:
    name: Frontend - Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run TypeScript type checking
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: Build production bundle
        working-directory: ./frontend
        env:
          VITE_API_URL: http://localhost:8000/api
          VITE_APP_NAME: StrateKaz
        run: npm run build

      - name: Check build size
        working-directory: ./frontend
        run: |
          du -sh dist/
          echo "Build completed successfully!"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════
  # CODE QUALITY SUMMARY
  # ═══════════════════════════════════════════════════
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.backend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.backend-test.result }}" == "success" ]] && [[ "${{ needs.frontend-build.result }}" == "success" ]]; then
            echo "✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "❌ Some checks failed. Please review the logs." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
