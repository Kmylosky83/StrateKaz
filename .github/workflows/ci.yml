name: CI - Continuous Integration

# Trigger conditions
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress workflows when a new push occurs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════════
  # BACKEND TESTING & VALIDATION
  # ═══════════════════════════════════════════════════
  backend-test:
    name: Backend - Django Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpq-dev \
            pkg-config \
            python3-dev \
            build-essential \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Set up environment variables
        working-directory: ./backend
        run: |
          cat > .env << 'EOF'
          DEBUG=True
          DJANGO_SETTINGS_MODULE=config.settings.testing
          SECRET_KEY=test-secret-key-for-ci-pipeline
          DB_ENGINE=django_tenants.postgresql_backend
          DB_NAME=test_db
          DB_USER=test_user
          DB_PASSWORD=test_password
          DB_HOST=127.0.0.1
          DB_PORT=5432
          ALLOWED_HOSTS=localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS=http://localhost:3010
          EOF
          echo "DJANGO_SETTINGS_MODULE=config.settings.testing" >> $GITHUB_ENV

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U test_user; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

      - name: Run Django checks
        working-directory: ./backend
        run: |
          python manage.py check

      - name: Run migrations
        working-directory: ./backend
        run: |
          python manage.py migrate_schemas --noinput

      - name: Collect static files
        working-directory: ./backend
        run: |
          python manage.py collectstatic --noinput

      - name: Run Django tests
        working-directory: ./backend
        run: |
          python manage.py test --verbosity=2 --keepdb

      - name: Run pytest with coverage gate
        working-directory: ./backend
        continue-on-error: true
        run: |
          pytest --disable-warnings --cov-fail-under=10

      - name: Check code formatting with Black
        working-directory: ./backend
        run: |
          black --check --diff .

      - name: Lint with Ruff
        working-directory: ./backend
        run: |
          ruff check .

      - name: Security audit with pip-audit
        working-directory: ./backend
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

  # ═══════════════════════════════════════════════════
  # FRONTEND BUILD & TYPE CHECKING
  # ═══════════════════════════════════════════════════
  frontend-build:
    name: Frontend - Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run TypeScript type checking
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Run ESLint
        working-directory: ./frontend
        run: npx eslint src --max-warnings 0

      - name: Security audit with npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Run frontend tests (Vitest)
        working-directory: ./frontend
        continue-on-error: true
        run: npx vitest run

      - name: Build production bundle
        working-directory: ./frontend
        env:
          VITE_API_URL: http://localhost:8000/api
          VITE_APP_NAME: StrateKaz
        run: npm run build

      - name: Check build size
        working-directory: ./frontend
        run: |
          du -sh dist/
          echo "Build completed successfully!"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════
  # CODE QUALITY SUMMARY
  # ═══════════════════════════════════════════════════
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.backend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          BACKEND="${{ needs.backend-test.result }}"
          FRONTEND="${{ needs.frontend-build.result }}"

          # Treat 'success' and 'cancelled' as acceptable (cancelled = superseded by newer push)
          BACKEND_OK=false
          FRONTEND_OK=false
          [[ "$BACKEND" == "success" || "$BACKEND" == "cancelled" ]] && BACKEND_OK=true
          [[ "$FRONTEND" == "success" || "$FRONTEND" == "cancelled" ]] && FRONTEND_OK=true

          if [[ "$BACKEND_OK" == "true" ]] && [[ "$FRONTEND_OK" == "true" ]]; then
            if [[ "$BACKEND" == "cancelled" || "$FRONTEND" == "cancelled" ]]; then
              echo "⏭️ Some jobs were cancelled (superseded by newer push). This is OK." >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
            fi
            exit 0
          else
            echo "❌ Some checks failed. Please review the logs." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
