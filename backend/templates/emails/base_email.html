<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StrateKaz{% endblock %}</title>
    <style>
        /* Reset */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }

        /* Base */
        body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #f4f5f7;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }

        .email-header {
            background-color: #1f2937;
            padding: 24px;
            text-align: center;
        }

        .email-header img {
            max-height: 40px;
        }

        .email-header h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
            margin: 16px 0 0 0;
        }

        .email-body {
            padding: 32px 24px;
        }

        .email-body h2 {
            color: #1f2937;
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 16px 0;
        }

        .email-body p {
            color: #4b5563;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 16px 0;
        }

        .email-button {
            display: inline-block;
            background-color: #3b82f6;
            color: #ffffff !important;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            margin: 8px 0;
        }

        .email-button:hover {
            background-color: #2563eb;
        }

        .email-button-secondary {
            background-color: #6b7280;
        }

        .email-card {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin: 16px 0;
        }

        .email-card-title {
            color: #374151;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0 0 8px 0;
        }

        .email-card-content {
            color: #1f2937;
            font-size: 16px;
            margin: 0;
        }

        .email-footer {
            background-color: #f9fafb;
            border-top: 1px solid #e5e7eb;
            padding: 24px;
            text-align: center;
        }

        .email-footer p {
            color: #6b7280;
            font-size: 14px;
            margin: 0 0 8px 0;
        }

        .email-footer a {
            color: #3b82f6;
            text-decoration: none;
        }

        .text-muted {
            color: #9ca3af;
            font-size: 12px;
        }

        .text-center {
            text-align: center;
        }

        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-warning { background-color: #fef3c7; color: #92400e; }
        .badge-success { background-color: #d1fae5; color: #065f46; }
        .badge-danger { background-color: #fee2e2; color: #991b1b; }
        .badge-info { background-color: #dbeafe; color: #1e40af; }

        @media only screen and (max-width: 600px) {
            .email-container {
                width: 100% !important;
            }
            .email-body {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f4f5f7;">
        <tr>
            <td align="center" style="padding: 24px 16px;">
                <table role="presentation" class="email-container" width="600" cellspacing="0" cellpadding="0">
                    <!-- Header -->
                    <tr>
                        <td class="email-header">
                            {% block header %}
                            <h1>StrateKaz</h1>
                            {% endblock %}
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td class="email-body">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td class="email-footer">
                            {% block footer %}
                            <p>Este es un mensaje automático del sistema StrateKaz.</p>
                            <p>Por favor no responda a este correo.</p>
                            <p class="text-muted mt-4">
                                &copy; {{ current_year|default:"2026" }} StrateKaz - Sistema de Gestión Integral
                            </p>
                            {% endblock %}
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
