{% if qr_base64 or doc_hash %}
<div class="sk-sello-section">
    <div class="sk-sello-x509">
        <div class="sk-sello-titulo">Documento controlado</div>
        <div><strong>Código:</strong> {{ documento_codigo }}</div>
        <div><strong>Versión:</strong> {{ version_actual }}</div>
        <div><strong>Empresa:</strong> {{ razon_social }}</div>
        <div><strong>Generado:</strong> {{ fecha_generacion }}</div>
        {% if doc_hash %}<div style="font-family:var(--sk-font-mono);font-size:5.5pt;color:var(--sk-gray-400);margin-top:1mm">SHA-256: {{ doc_hash }}</div>{% endif %}
    </div>
    {% if qr_base64 %}
    <div class="sk-qr-container">
        <img src="data:image/png;base64,{{ qr_base64 }}" class="sk-qr-img" alt="QR Verificación">
        <div class="sk-qr-label">Verificar autenticidad</div>
    </div>
    {% endif %}
</div>
{% endif %}
