# =============================================================================
# NGINX CONFIGURATION - STRATEKAZ MULTI-TENANT
# =============================================================================
#
# Configuración de Nginx para arquitectura multi-tenant con subdominios.
# Usa certificado SSL wildcard para *.stratekaz.com
#
# Ubicación: /etc/nginx/sites-available/stratekaz
# Activar: ln -s /etc/nginx/sites-available/stratekaz /etc/nginx/sites-enabled/
#
# =============================================================================

# Upstream para Gunicorn
upstream stratekaz_backend {
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 32;
}

# =============================================================================
# REDIRECT HTTP → HTTPS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name stratekaz.com *.stratekaz.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# =============================================================================
# MAIN HTTPS SERVER (Wildcard)
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Acepta todos los subdominios
    server_name stratekaz.com *.stratekaz.com;

    # -------------------------------------------------------------------------
    # SSL CONFIGURATION (Wildcard Certificate)
    # -------------------------------------------------------------------------
    # Certificado wildcard generado con:
    # certbot certonly --manual --preferred-challenges dns -d stratekaz.com -d *.stratekaz.com

    ssl_certificate /etc/letsencrypt/live/stratekaz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stratekaz.com/privkey.pem;

    # SSL Security Settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (15768000 seconds = 6 months)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # -------------------------------------------------------------------------
    # LOGGING
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/stratekaz_access.log;
    error_log /var/log/nginx/stratekaz_error.log;

    # -------------------------------------------------------------------------
    # GENERAL SETTINGS
    # -------------------------------------------------------------------------
    client_max_body_size 100M;
    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # -------------------------------------------------------------------------
    # STATIC FILES (Frontend)
    # -------------------------------------------------------------------------
    location /static/ {
        alias /var/www/stratekaz/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # MEDIA FILES (Uploaded files)
    # -------------------------------------------------------------------------
    location /media/ {
        alias /var/www/stratekaz/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # -------------------------------------------------------------------------
    # API ENDPOINTS (Django Backend)
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://stratekaz_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # -------------------------------------------------------------------------
    # DJANGO ADMIN
    # -------------------------------------------------------------------------
    location /admin/ {
        proxy_pass http://stratekaz_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # HEALTH CHECK
    # -------------------------------------------------------------------------
    location /health/ {
        proxy_pass http://stratekaz_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # -------------------------------------------------------------------------
    # PWA MANIFEST (Dynamic)
    # -------------------------------------------------------------------------
    location = /manifest.json {
        proxy_pass http://stratekaz_backend/api/core/branding/manifest/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache por 1 hora
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # -------------------------------------------------------------------------
    # SERVICE WORKER
    # -------------------------------------------------------------------------
    location = /sw.js {
        alias /var/www/stratekaz/frontend/dist/sw.js;
        add_header Cache-Control "no-cache";
        expires 0;
    }

    # -------------------------------------------------------------------------
    # FRONTEND (React SPA)
    # -------------------------------------------------------------------------
    location / {
        root /var/www/stratekaz/frontend/dist;
        index index.html;

        # SPA: todas las rutas van a index.html
        try_files $uri $uri/ /index.html;

        # Cache de assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # -------------------------------------------------------------------------
    # SECURITY HEADERS
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # DENY ACCESS TO HIDDEN FILES
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# =============================================================================
# CUSTOM DOMAIN SUPPORT (Optional)
# =============================================================================
# Para dominios personalizados de clientes (ej: erp.clienteabc.com)
# Se requiere configuración adicional por dominio con su propio certificado SSL
#
# Ejemplo:
# server {
#     listen 443 ssl http2;
#     server_name erp.clienteabc.com;
#
#     ssl_certificate /etc/letsencrypt/live/erp.clienteabc.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/erp.clienteabc.com/privkey.pem;
#
#     # Agregar header para identificar el tenant (opcional)
#     proxy_set_header X-Custom-Domain erp.clienteabc.com;
#
#     # ... resto de configuración igual que arriba ...
# }
# =============================================================================
