# Nginx configuration for StrateKaz (SIN SSL - para configuración inicial)
# /etc/nginx/sites-available/empresa1.tudominio.com
#
# USAR ESTE ARCHIVO PRIMERO, luego ejecutar certbot para agregar SSL
#
# INSTRUCCIONES:
# 1. Copiar: sudo cp empresa-sin-ssl.conf /etc/nginx/sites-available/empresa1.tudominio.com
# 2. Editar y reemplazar "empresa1.tudominio.com" con tu dominio
# 3. Habilitar: sudo ln -s /etc/nginx/sites-available/empresa1.tudominio.com /etc/nginx/sites-enabled/
# 4. Probar: sudo nginx -t
# 5. Recargar: sudo systemctl reload nginx
# 6. SSL: sudo certbot --nginx -d empresa1.tudominio.com

upstream stratekaz_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name empresa1.tudominio.com;

    # Logging
    access_log /var/log/nginx/empresa1.tudominio.com.access.log;
    error_log /var/log/nginx/empresa1.tudominio.com.error.log;

    # Max upload size
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Root for frontend
    root /var/www/stratekaz/frontend;
    index index.html;

    # API Backend
    location /api/ {
        proxy_pass http://stratekaz_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://stratekaz_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static files
    location /static/ {
        alias /var/www/stratekaz/staticfiles/;
        expires 30d;
    }

    # Media files
    location /media/ {
        alias /var/www/stratekaz/media/;
        expires 7d;
    }

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
