# Nginx configuration for StrateKaz
# /etc/nginx/sites-available/empresa1.tudominio.com
#
# INSTRUCCIONES:
# 1. Copiar este archivo: sudo cp empresa.conf /etc/nginx/sites-available/empresa1.tudominio.com
# 2. Editar y reemplazar "empresa1.tudominio.com" con tu dominio real
# 3. Habilitar: sudo ln -s /etc/nginx/sites-available/empresa1.tudominio.com /etc/nginx/sites-enabled/
# 4. Probar: sudo nginx -t
# 5. Recargar: sudo systemctl reload nginx
# 6. SSL: sudo certbot --nginx -d empresa1.tudominio.com

# Upstream para Gunicorn
upstream stratekaz_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name empresa1.tudominio.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name empresa1.tudominio.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/empresa1.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/empresa1.tudominio.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/empresa1.tudominio.com.access.log;
    error_log /var/log/nginx/empresa1.tudominio.com.error.log;

    # Max upload size
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;

    # Root for frontend (React build)
    root /var/www/stratekaz/frontend;
    index index.html;

    # API Backend (Django)
    location /api/ {
        proxy_pass http://stratekaz_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://stratekaz_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files (collected)
    location /static/ {
        alias /var/www/stratekaz/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (user uploads)
    location /media/ {
        alias /var/www/stratekaz/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check endpoint
    location /health/ {
        proxy_pass http://stratekaz_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend (React SPA)
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Cache static assets from frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
