# ===================================================================
# Docker Compose - PRODUCCIÓN
# StrateKaz
# ===================================================================
#
# IMPORTANTE: Este archivo está configurado para producción
# - No expone puertos innecesarios
# - Usa Dockerfiles optimizados
# - Configuración de seguridad mejorada
# - Resource limits apropiados
# - Logging configurado
# - Healthchecks completos
#
# USO:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml down
# ===================================================================

version: '3.8'

services:
  # ==================== BASE DE DATOS MYSQL ====================
  db:
    image: mysql:8.0
    container_name: grasas_huesos_db_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_HOST: '%'
    # Solo exponer puerto en desarrollo/staging, en producción usar red interna
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql_data_prod:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups/mysql:/backups
    networks:
      - grasas_network_prod
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --innodb_buffer_pool_size=1G
      --innodb_log_file_size=256M
      --slow_query_log=1
      --slow_query_log_file=/var/log/mysql/slow.log
      --long_query_time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=mysql"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G

  # ==================== BACKEND DJANGO ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      args:
        - BUILD_DATE=${BUILD_DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}
        - VCS_REF=${VCS_REF:-$(git rev-parse --short HEAD)}
    container_name: grasas_huesos_backend_prod
    restart: always
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 4
             --worker-class sync
             --worker-tmp-dir /dev/shm
             --max-requests 1000
             --max-requests-jitter 50
             --timeout 60
             --access-logfile -
             --error-logfile -
             --log-level info"
    volumes:
      - static_volume_prod:/app/static
      - media_volume_prod:/app/media
      - ./logs/backend:/app/logs
    # Solo exponer puerto si no hay nginx/reverse proxy
    # ports:
    #   - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_ENGINE=django.db.backends.mysql
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-True}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-True}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-True}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - grasas_network_prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service=backend"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G

  # ==================== FRONTEND REACT ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_APP_NAME=${VITE_APP_NAME:-StrateKaz}
    container_name: grasas_huesos_frontend_prod
    restart: always
    ports:
      - "80:80"
      # - "443:443"  # Descomentar para HTTPS
    volumes:
      # Volumen para certificados SSL si se usa HTTPS directo
      # - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - grasas_network_prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=frontend"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ==================== NGINX REVERSE PROXY (Opcional) ====================
  # Descomentar si necesitas un reverse proxy adicional
  # nginx:
  #   image: nginx:1.25-alpine
  #   container_name: grasas_huesos_nginx_prod
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #     - static_volume_prod:/var/www/static:ro
  #     - media_volume_prod:/var/www/media:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - grasas_network_prod
  #   healthcheck:
  #     test: ["CMD", "nginx", "-t"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

# ==================== VOLÚMENES ====================
volumes:
  mysql_data_prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/mysql
  static_volume_prod:
    driver: local
  media_volume_prod:
    driver: local

# ==================== REDES ====================
networks:
  grasas_network_prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
