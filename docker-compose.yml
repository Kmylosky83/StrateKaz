version: '3.8'

services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: grasas_huesos_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: grasas_huesos_db
      MYSQL_ROOT_PASSWORD: root_password_2024
      MYSQL_USER: grasas_user
      MYSQL_PASSWORD: grasas_pass_2024
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - grasas_network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password_2024"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grasas_huesos_backend
    restart: unless-stopped
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production-2024
      - DATABASE_ENGINE=django.db.backends.mysql
      - DATABASE_NAME=grasas_huesos_db
      - DATABASE_USER=grasas_user
      - DATABASE_PASSWORD=grasas_pass_2024
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3010,http://127.0.0.1:3010
    depends_on:
      db:
        condition: service_healthy
    networks:
      - grasas_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: grasas_huesos_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3010:3010"
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - VITE_APP_NAME=Grasas y Huesos del Norte
    depends_on:
      - backend
    networks:
      - grasas_network
    stdin_open: true
    tty: true

volumes:
  mysql_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  grasas_network:
    driver: bridge
