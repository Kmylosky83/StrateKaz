# =============================================================================
# STRATEKAZ - Docker Compose para Desarrollo
# =============================================================================
#
# Uso:
#   docker-compose up -d          # Iniciar servicios
#   docker-compose down           # Detener servicios
#   docker-compose logs -f        # Ver logs
#   docker-compose exec backend bash  # Entrar al contenedor
#
# Primera vez:
#   docker-compose up -d
#   docker-compose exec backend python manage.py migrate
#   docker-compose exec backend python manage.py createsuperuser
#
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL - Base de datos principal
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: stratekaz_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: stratekaz
      POSTGRES_USER: stratekaz
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stratekaz_dev_2024}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratekaz -d stratekaz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stratekaz_network

  # ===========================================================================
  # Redis - Cache y Celery Broker
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: stratekaz_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-stratekaz_redis_dev}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-stratekaz_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stratekaz_network

  # ===========================================================================
  # Backend Django
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stratekaz_backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DB_NAME=stratekaz
      - DB_USER=stratekaz
      - DB_PASSWORD=${DB_PASSWORD:-stratekaz_dev_2024}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-stratekaz_redis_dev}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-stratekaz_redis_dev}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-stratekaz_redis_dev}@redis:6379/1
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,demo.localhost,.localhost
      - CORS_ALLOWED_ORIGINS=http://localhost:3010,http://127.0.0.1:3010,http://demo.localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py collectstatic --noinput &&
        python manage.py runserver 0.0.0.0:8000
      "
    networks:
      - stratekaz_network

  # ===========================================================================
  # Celery Worker - Tareas asíncronas
  # ===========================================================================
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stratekaz_celery
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DB_NAME=stratekaz
      - DB_USER=stratekaz
      - DB_PASSWORD=${DB_PASSWORD:-stratekaz_dev_2024}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-stratekaz_redis_dev}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-stratekaz_redis_dev}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-stratekaz_redis_dev}@redis:6379/1
    depends_on:
      - backend
      - redis
    command: celery -A config worker -l info --concurrency=2 -Q celery,tenant_ops,emails,reports,files,maintenance,monitoring,scraping,compliance,notifications,workflow
    networks:
      - stratekaz_network

  # ===========================================================================
  # Celery Beat - Tareas programadas
  # ===========================================================================
  celerybeat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stratekaz_celerybeat
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DB_NAME=stratekaz
      - DB_USER=stratekaz
      - DB_PASSWORD=${DB_PASSWORD:-stratekaz_dev_2024}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-stratekaz_redis_dev}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-stratekaz_redis_dev}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-stratekaz_redis_dev}@redis:6379/1
    depends_on:
      - celery
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - stratekaz_network

  # ===========================================================================
  # Flower - Monitor de Celery (opcional)
  # ===========================================================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stratekaz_flower
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-stratekaz_redis_dev}@redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - celery
    command: celery -A config flower --port=5555
    networks:
      - stratekaz_network
    profiles:
      - monitoring

  # ===========================================================================
  # Frontend React (opcional - para desarrollo integrado)
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: stratekaz_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    ports:
      - "3010:3010"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    networks:
      - stratekaz_network
    profiles:
      - frontend

  # ===========================================================================
  # pgAdmin (opcional - administración de BD)
  # ===========================================================================
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: stratekaz_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stratekaz.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - stratekaz_network
    profiles:
      - tools

  # ===========================================================================
  # Redis Commander (opcional - administración de Redis)
  # ===========================================================================
  redis-commander:
    image: rediscommander/redis-commander:0.8.1
    container_name: stratekaz_redis_commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-stratekaz_redis_dev}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - stratekaz_network
    profiles:
      - tools

# =============================================================================
# VOLÚMENES
# =============================================================================
volumes:
  postgres_data:
    name: stratekaz_postgres_data
  redis_data:
    name: stratekaz_redis_data
  static_volume:
    name: stratekaz_static
  media_volume:
    name: stratekaz_media
  pgadmin_data:
    name: stratekaz_pgadmin

# =============================================================================
# REDES
# =============================================================================
networks:
  stratekaz_network:
    name: stratekaz_network
    driver: bridge
