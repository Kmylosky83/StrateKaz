# =============================================================================
# STRATEKAZ - Nginx Location Blocks (shared between HTTP and HTTPS)
# =============================================================================

client_max_body_size 50M;

# ── Security Headers ──────────────────────────────────────────────
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# ── Gzip Compression ─────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# ── Static Files ─────────────────────────────────────────────────
location /static/ {
    alias /app/staticfiles/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# ── Media Files ──────────────────────────────────────────────────
location /media/ {
    alias /app/media/;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;

    # Block execution of scripts in media
    location ~* \.(php|py|sh|pl|cgi)$ {
        deny all;
    }
}

# ── Health Check (no rate limit) ─────────────────────────────────
location = /api/health/ {
    proxy_pass http://backend;
    proxy_set_header Host $host;
    access_log off;
}

# ── Login rate limiting ──────────────────────────────────────────
location = /api/auth/login/ {
    limit_req zone=login burst=3 nodelay;
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── API Endpoints ────────────────────────────────────────────────
location /api/ {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
}

# ── Django Admin ─────────────────────────────────────────────────
location /admin/ {
    limit_req zone=api burst=10 nodelay;
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Frontend (SPA) ───────────────────────────────────────────────
# En producción (VPS), el frontend se sirve desde /opt/stratekaz/frontend/dist/.
# Para habilitar localmente, descomentar:
# location / {
#     root /app/frontend/dist;
#     try_files $uri $uri/ /index.html;
#
#     # index.html NO debe cachearse: siempre referencias frescas a assets con hash
#     location = /index.html {
#         add_header Cache-Control "no-cache, no-store, must-revalidate";
#         add_header Pragma "no-cache";
#         expires 0;
#     }
#
#     # Assets con hash en el nombre → cache largo (inmutable)
#     location ~* /assets/ {
#         expires 1y;
#         add_header Cache-Control "public, immutable";
#         access_log off;
#     }
# }
#
# NOTA IMPORTANTE (H-FE-CACHE-01): La config de producción vive en
# /etc/nginx/sites-enabled/stratekaz en el VPS. Si no tiene Cache-Control
# no-cache para index.html, los usuarios verán errores "Failed to fetch
# dynamically imported module" tras cada deploy (chunk hash mismatch).
# Ver hallazgos-pendientes.md #H-FE-CACHE-01.

# ── Block common attack paths ────────────────────────────────────
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* \.(env|git|htaccess|htpasswd|ini|log|bak|sql)$ {
    deny all;
    access_log off;
    log_not_found off;
}
