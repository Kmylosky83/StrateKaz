    <meta property="og:description" content="20+ años transformando empresas colombianas. Consultoría estratégica + Software de Gestión Integral. 100% éxito en certificaciones ISO." />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="StrateKaz | Consultoría 4.0" />
    <meta name="twitter:description" content="Consultoría estratégica + Plataforma de Gestión Integral. ISO 9001, 14001, 45001, SG-SST, PESV." />
    <meta name="twitter:image" content="https://stratekaz.com/og-image.png" />

    <!-- Geo Tags for Colombia -->
    <meta name="geo.region" content="CO" />
    <meta name="geo.country" content="Colombia" />

    <!-- Mobile Web App Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StrateKaz" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/apple-touch-icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/icons/apple-touch-icon-76x76.png" />

    <title>StrateKaz | Consultoría 4.0</title>

    <!-- CRITICAL: Cache Killer must load BEFORE React -->
    <script src="/cache-killer.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent FOUC - Dark background immediately -->
    <style>
      html,
      body {
        background-color: #000000;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      #root {
        background-color: #000000;
        min-height: 100vh;
      }

      /* Loading spinner while app loads */
      .app-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid #2a2a2a;
        border-top: 2px solid #ec268f;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loading-text {
        color: #cccccc;
        font-family: Inter, sans-serif;
        font-size: 14px;
        font-weight: 500;
        opacity: 0;
        animation: fadeIn 0.5s ease-in 0.3s forwards;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* Hide loader when React app is ready */
      .app-loader.fade-out {
        opacity: 0;
        transition: opacity 0.3s ease-out;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Loading indicator -->
    <div class="app-loader">
      <div class="spinner"></div>
      <div class="loading-text">Cargando StrateKaz...</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
