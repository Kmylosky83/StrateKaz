    <!-- Prevent FOUC - Dark background immediately -->
    <style>
      html,
      body {
        background-color: #000000;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      #root {
        background-color: #000000;
        min-height: 100vh;
      }

      /* Loading spinner while app loads */
      .app-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid #2a2a2a;
        border-top: 2px solid #ec268f;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .loading-text {
        color: #cccccc;
        font-family: Inter, sans-serif;
        font-size: 14px;
        font-weight: 500;
        opacity: 0;
        animation: fadeIn 0.5s ease-in 0.3s forwards;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* Hide loader when React app is ready */
      .app-loader.fade-out {
        opacity: 0;
        transition: opacity 0.3s ease-out;
        pointer-events: none;
      }
    </style>
  </head>
