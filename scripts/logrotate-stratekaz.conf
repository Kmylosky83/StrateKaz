# Logrotate config para StrateKaz VPS
# Instalar: sudo cp scripts/logrotate-stratekaz.conf /etc/logrotate.d/stratekaz
# Verificar: sudo logrotate -d /etc/logrotate.d/stratekaz

/var/log/stratekaz/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 www-data www-data
    sharedscripts
    postrotate
        # Recargar Gunicorn para que reabra los file descriptors
        systemctl reload stratekaz-gunicorn 2>/dev/null || true
    endscript
}

/var/log/stratekaz/celery/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 0640 www-data www-data
    sharedscripts
    postrotate
        systemctl restart stratekaz-celery 2>/dev/null || true
    endscript
}
