# =============================================================================
# STRATEKAZ — Template Nginx VPS (producción)
# Ruta en VPS: /etc/nginx/sites-enabled/stratekaz
#
# Para aplicar cambios:
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# CRÍTICO: index.html debe tener Cache-Control: no-cache para evitar el
# error "Failed to fetch dynamically imported module" tras cada deploy Vite.
# Ver hallazgos-pendientes.md #H-FE-CACHE-01
# =============================================================================

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name *.stratekaz.com stratekaz.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name *.stratekaz.com;

    ssl_certificate     /etc/letsencrypt/live/stratekaz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stratekaz.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    # ── Security Headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_vps:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_vps:10m rate=5r/m;

    # ── API Django (Gunicorn) ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_vps burst=60 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location = /api/auth/login/ {
        limit_req zone=login_vps burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/health/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        access_log off;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static y Media Django ─────────────────────────────────────────
    location /static/ {
        alias /opt/stratekaz/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /opt/stratekaz/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Frontend SPA (React + Vite) ───────────────────────────────────
    root /opt/stratekaz/frontend/dist;

    # CRÍTICO: index.html sin caché para que siempre apunte a los assets
    # con el hash correcto del último build. Sin esto: chunk hash mismatch
    # tras cada deploy → "Failed to fetch dynamically imported module".
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Assets Vite (con hash en nombre) → cache largo
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Bloquear rutas peligrosas ─────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|htaccess|htpasswd|ini|log|bak|sql)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
